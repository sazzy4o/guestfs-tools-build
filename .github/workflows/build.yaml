name: Release Workflow
on: [create]

permissions:
  contents: write

env:
  LIBGUESTFS_VERSION: 1.58.1
  LIBGUESTFS_SERIES: 1.58-stable
  GUESTFS_TOOLS_VERSION: v1.55.6
  ARTIFACT_BASENAME: libguestfs-tools-1.58.1-linux-x86_64

jobs:
  build:
    name: Build
    # Build on the oldest supported GitHub-hosted Ubuntu image so dynamically
    # linked guestfs-tools binaries keep an older glibc baseline.
    runs-on: ubuntu-22.04
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            cpio \
            file \
            flex \
            gawk \
            gettext \
            git \
            gperf \
            libaugeas-dev \
            libguestfs-dev \
            libhivex-dev \
            libhivex-ocaml-dev \
            libjansson-dev \
            libjson-c-dev \
            liblzma-dev \
            libmagic-dev \
            libncurses-dev \
            libosinfo-1.0-dev \
            libgettext-ocaml-dev \
            libpcre-ocaml-dev \
            libpcre2-dev \
            libtirpc-dev \
            libvirt-dev \
            libtool \
            libxml2-dev \
            libxml2-utils \
            libzstd-dev \
            ocaml-findlib \
            ocaml-nox \
            pkg-config \
            qemu-system-x86 \
            qemu-utils \
            supermin \
            wget \
            xorriso \
            zstd
          pkg-config --modversion augeas
          pkg-config --modversion json-c
          ocamlc -version
          ocamlfind printconf

      - name: Download source
        run: |
          wget -4 -O "libguestfs-${LIBGUESTFS_VERSION}.tar.gz" \
            "https://download.libguestfs.org/${LIBGUESTFS_SERIES}/libguestfs-${LIBGUESTFS_VERSION}.tar.gz"

      - name: Extract source
        run: tar -xzf "libguestfs-${LIBGUESTFS_VERSION}.tar.gz"

      - name: Configure
        working-directory: ./libguestfs-${{ env.LIBGUESTFS_VERSION }}
        run: |
          STATIC_LIBS="$(pkg-config --libs --static libxml-2.0 json-c libpcre2-8 libtirpc) -lzstd -lpthread -ldl -lm -lstdc++"
          ac_cv_func_xmlBufferDetach=yes \
            ./configure \
            CFLAGS="-O3" \
            LIBS="$STATIC_LIBS" \
            --prefix=/usr/local \
            --enable-shared \
            --enable-static \
            --disable-dependency-tracking \
            --disable-daemon \
            --disable-appliance \
            --without-libvirt \
            --disable-fuse \
            --enable-ocaml \
            --disable-perl \
            --disable-python \
            --disable-ruby \
            --disable-haskell \
            --disable-php \
            --disable-erlang \
            --disable-lua \
            --disable-golang \
            --disable-gobject \
            --disable-rust

      - name: Build
        working-directory: ./libguestfs-${{ env.LIBGUESTFS_VERSION }}
        run: |
          STATIC_LIBS="$(pkg-config --libs --static libxml-2.0 json-c libpcre2-8 libtirpc) -lzstd -lpthread -ldl -lm -lstdc++"
          make -j"$(nproc)" LIBS="$STATIC_LIBS"
          rm -f \
            fish/guestfish fish/.libs/guestfish \
            rescue/virt-rescue rescue/.libs/virt-rescue \
            test-tool/libguestfs-test-tool test-tool/.libs/libguestfs-test-tool
          make -C fish LDFLAGS="-all-static" LIBS="$STATIC_LIBS" guestfish
          make -C rescue LDFLAGS="-all-static" LIBS="$STATIC_LIBS" virt-rescue
          make -C test-tool LDFLAGS="-all-static" LIBS="$STATIC_LIBS" libguestfs-test-tool

      - name: Install
        working-directory: ./libguestfs-${{ env.LIBGUESTFS_VERSION }}
        run: |
          STATIC_LIBS="$(pkg-config --libs --static libxml-2.0 json-c libpcre2-8 libtirpc) -lzstd -lpthread -ldl -lm -lstdc++"
          make install DESTDIR="${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}" LIBS="$STATIC_LIBS"
          cp fish/guestfish "${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/bin/guestfish"
          cp rescue/virt-rescue "${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/bin/virt-rescue"
          cp test-tool/libguestfs-test-tool "${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/bin/libguestfs-test-tool"

      - name: Build guestfs-tools
        run: |
          git clone --branch "${GUESTFS_TOOLS_VERSION}" --depth 1 --recurse-submodules \
            https://github.com/libguestfs/guestfs-tools.git guestfs-tools
          cd guestfs-tools
          git submodule update --init --recursive
          autoreconf -i
          export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export OCAMLPATH="${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/lib/ocaml"
          export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/lib:${LD_LIBRARY_PATH:-}"
          STATIC_LIBS="$(PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" pkg-config --libs --static libguestfs)"
          CPPFLAGS="-I${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/include -Dcaml_unix_error=unix_error" \
            LDFLAGS="-static -L${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}/usr/local/lib" \
            LIBGUESTFS_LIBS="$STATIC_LIBS" \
            ./configure --prefix=/usr/local
          make -j"$(nproc)" LIBGUESTFS_LIBS="$STATIC_LIBS"
          make install DESTDIR="${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}"

      - name: Verify static binaries
        run: |
          for bin in guestfish virt-rescue libguestfs-test-tool virt-resize virt-sparsify; do
            path="dist/${ARTIFACT_BASENAME}/usr/local/bin/${bin}"
            test -x "$path"
            file "$path"
            file "$path" | grep -qi "statically linked"
            ! ldd "$path"
          done

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          bin_dir="dist/${ARTIFACT_BASENAME}/usr/local/bin"
          test -d "$bin_dir"
          find "$bin_dir" -maxdepth 1 \( -type f -o -type l \) -printf "%f\n" | sort
          find "$bin_dir" -maxdepth 1 \( -type f -o -type l \) -print0 | sort -z | while IFS= read -r -d '' path; do
            bin="$(basename "$path")"
            test -x "$path"
            if file "$path" | grep -q "ELF"; then
              file "$path" | grep -qi "statically linked"
            fi
            echo "Packaging binary artifact: $bin"
            cp -L "$path" "artifacts/${ARTIFACT_BASENAME}-${bin}"
            sha256sum "artifacts/${ARTIFACT_BASENAME}-${bin}" > "artifacts/${ARTIFACT_BASENAME}-${bin}.sha256"
            test -s "artifacts/${ARTIFACT_BASENAME}-${bin}"
            test -s "artifacts/${ARTIFACT_BASENAME}-${bin}.sha256"
          done
          ! find artifacts -name "*.tar.gz" -print -quit | grep -q .

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: artifacts/*
          if-no-files-found: error

      - name: Create release
        if: github.event.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          tag: ${{ github.event.ref }}
          name: ${{ github.event.ref }}
          draft: true
